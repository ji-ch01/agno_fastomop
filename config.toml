[models]
default_provider = "ollama"
default_id = "gpt-oss:20b"

[models.providers.anthropic]
provider = "anthropic"
model_id = "claude-3-5-sonnet-20241022"

[models.providers.openai]
provider = "openai"
model_id = "gpt-4-turbo-preview"

[models.providers.azure]
provider = "azure"
model_id = "gpt-4.1"
api_version = "2025-01-01-preview"
temperature = 0.0  # Deterministic responses

[models.providers.ollama]
provider = "ollama"
model_id = "gpt-oss:20b"
num_ctx = 32768  # gpt-oss:20b supports 32K; Ollama defaults to 2-8K without this

[models.providers.ollama_light]
provider = "ollama"
model_id = "qwen2.5:7b"
num_ctx = 32768

[models.providers.ollama_medgemma]
provider = "ollama"
model_id = "MedAIBase/MedGemma1.5:4b"

[models.providers.ollama_gpt_oss_120b]
provider = "ollama"
model_id = "gpt-oss:120b"
num_ctx = 32768  # Supports 131K natively, but 32K balances KV cache VRAM vs depth on A100 80GB (~65GB weights + ~8GB KV @ 32K)

[models.providers.ollama_qwen3]
provider = "ollama"
model_id = "qwen3:30b-a3b"
num_ctx = 32768

[models.providers.ollama_medgemma_27b]
provider = "ollama_medgemma_tools"
model_id = "medgemma-tools:27b"

[agents.database]
name = "OMOP Database Agent"
model_provider = "ollama"
prompt_name = "database_agent"
prompt_label = "dev"
reasoning = false
markdown = false

[agents.semantic]
name = "OMOP Semantic Agent"
model_provider = "ollama"
prompt_name = "semantic_agent"
prompt_label = "dev"
reasoning = false  # Disable reasoning - output_schema enforces JSON, reasoning adds explanatory text

[agents.orchestrator]
name = "OMOP Orchestrator"
model_provider = "ollama"
prompt_name = "supervisor"
prompt_label = "dev"
reasoning = false

[agents.imaging]
name = "Clinical Imaging Agent"
model_provider = "ollama_medgemma"
prompt_name = "imaging_agent"
prompt_label = "dev"
reasoning = false
markdown = true

[agents.ards_orchestrator]
name = "ARDS Classification Orchestrator"
model_provider = "ollama"              # gpt-oss:20b — reliable instruction following + native tool calling
prompt_name = "ards_classifier"        # Swap to ollama_gpt_oss_120b for 131K context + stronger reasoning (requires 80GB GPU)
prompt_label = "dev"
reasoning = false
markdown = true

[hpc]
host = ""          # Override with HPC_HOST env var
username = ""      # Override with HPC_USER env var
ssh_key_path = ""  # Override with HPC_SSH_KEY_PATH env var
port = 22          # Override with HPC_PORT env var

[omcp]
transport = "stdio"
command = ""  # Override with MCP_COMMAND env var or set to: uv run --directory /path/to/omcp_server python src/omcp/main.py

[milvus]
host = "localhost"
port = 19530
collection = "omop_clinical_concepts"
embedding_model = "abhinand/MedEmbed-large-v0.1"

[observability]
tracing_enabled = true
disable_batch = true
